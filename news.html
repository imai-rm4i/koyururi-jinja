<div class="lb-backdrop" id="lightbox">
  <div class="lb-box" role="dialog" aria-modal="true" aria-label="画像プレビュー">
    <button type="button" class="lb-close" aria-label="閉じる">×</button>
    <img class="lb-img" alt="">

  </div>

<script>
(function(){
  var NEWS_URL='./news.json';var PER_PAGE=10;
  var listEl=document.getElementById('newsFullList');
  var pagerEl=document.getElementById('pager');
  var statusEl=document.getElementById('status');
  var lb=document.getElementById('lightbox');
  var lbImg=lb.querySelector('.lb-img');
  var lbClose=lb.querySelector('.lb-close');
  function openLb(src){lbImg.src=src;lb.classList.add('is-open');}
  function closeLb(){lb.classList.remove('is-open');lbImg.src='';}
  lb.addEventListener('click',function(e){if(e.target===lb)closeLb();});
  lbClose.addEventListener('click',closeLb);
  window.addEventListener('keydown',function(e){if(e.key==='Escape')closeLb();});
  function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function fmtDate(d){if(!d)return'';var p=d.split('-');if(p.length!==3)return d;return parseInt(p[0])+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日';}
  function getPage(){var p=parseInt(new URLSearchParams(location.search).get('page')||'1',10);return p>0?p:1;}
  function setPage(p){var sp=new URLSearchParams(location.search);sp.set('page',p);history.pushState(null,'',location.pathname+'?'+sp.toString());}
  function renderList(items){
    listEl.innerHTML='';
    if(!items.length){listEl.innerHTML='<p style="text-align:center;color:#7a6040;">お知らせがありません</p>';return;}
    items.forEach(function(item){
      var date=fmtDate(item.date||'');var title=esc(item.title||'');var body=esc(item.body||'');var images=item.images||[];
      var html='<div class="news-full-item">';
      if(date)html+='<div class="news-full-date">'+date+'</div>';
      if(title)html+='<div class="news-full-title">'+title+'</div>';
      if(body)html+='<div class="news-full-body">'+body+'</div>';
      if(images.length){html+='<div class="news-full-images">';images.forEach(function(img){var s='./'+img.replace(/\\//g,'/');html+='<img src="'+esc(s)+'" alt="" loading="lazy" data-lb-src="'+esc(s)+'">';});html+='</div>';}
      html+='</div>';
      listEl.insertAdjacentHTML('beforeend',html);
    });
  }
  function renderPager(page,total){
    pagerEl.innerHTML='';if(total<=1)return;
    function lnk(label,p,dis,cur){var a=document.createElement('a');a.textContent=label;a.href='?page='+p;if(cur)a.setAttribute('aria-current','page');if(dis)a.classList.add('disabled');a.onclick=function(e){e.preventDefault();if(!dis)go(p);};return a;}
    pagerEl.appendChild(lnk('←',page-1,page<=1,false));
    for(var i=1;i<=total;i++)pagerEl.appendChild(lnk(String(i),i,false,i===page));
    pagerEl.appendChild(lnk('→',page+1,page>=total,false));
  }
  var all=[];
  function go(page){
    var total=Math.ceil(all.length/PER_PAGE);var p=Math.min(Math.max(1,page),total||1);
    setPage(p);var start=(p-1)*PER_PAGE;renderList(all.slice(start,start+PER_PAGE));renderPager(p,total);
    statusEl.textContent=all.length>0?all.length+'件中 '+(start+1)+'〜'+Math.min(start+PER_PAGE,all.length)+'件を表示':'';
    window.scrollTo({top:0,behavior:'smooth'});
  }
  async function init(){
    try{var res=await fetch(NEWS_URL+'?t='+Date.now(),{cache:'no-store'});all=await res.json();
    all.sort(function(a,b){return(b.datetime||b.date||'').localeCompare(a.datetime||a.date||'');});go(getPage());}
    catch(e){listEl.innerHTML='<p style="text-align:center;color:#7a6040;">お知らせを読み込めませんでした</p>';}
  }
  window.addEventListener('popstate',function(){go(getPage());});
  document.addEventListener('click',function(e){var img=e.target.closest('img[data-lb-src]');if(img)openLb(img.getAttribute('data-lb-src'));});
  init();
})();
</script>
